name: Executar Macro Ultra Trends

on:
  schedule:
    # Rodar a cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4 # ATUALIZADO PARA v4

    - name: Configurar o Python
      uses: actions/setup-python@v5 # ATUALIZADO PARA v5
      with:
        python-version: '3.9'

    - name: Instalar dependências
      run: |
        pip install google-generativeai python-dotenv

    - name: Rodar o Motor de Trends
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python macro_ultra.py

    - name: Salvar os JSONs gerados
      uses: actions/upload-artifact@v4 # ATUALIZADO PARA v4
      with:
        name: trends-json-files
        path: trends_*.json
